server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: flink-app
    static_configs:
      - targets: []
        labels:
          job: flink-otel-demo
          __path__: /var/log/app/*.log
